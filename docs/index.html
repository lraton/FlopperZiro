<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FlopperZiro Documentation</title>
  <!-- Docsify theme -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify/themes/dark.css" />

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  
  <style>
    /* Fix for Docsify dark theme white table background bug */
    .markdown-section table tr:nth-child(2n) {
      background-color: #2b2b2b !important;
    }
    .markdown-section table th, .markdown-section table td {
      border: 1px solid #444 !important;
    }
  </style>
</head>

<body>
  <div id="app"></div>

  <!-- Docsify Script -->
  <script src="//unpkg.com/docsify/lib/docsify.min.js"></script>
  <script>
    window.$docsify = {
      name: 'FlopperZiro Documentation',
      repo: 'https://github.com/lraton/FlopperZiro',
      loadSidebar: true,
      homepage: 'README.md',
      themeColor: '#42b983',
      search: {
        maxAge: 86400, // Expiration time for the search index in seconds
        paths: 'auto'  // Automatically generate paths
      }
    }
  </script>
</body>

</html>
